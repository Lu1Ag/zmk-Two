# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
CONFIG_ZMK_DISPLAY=y

# Enable a widget to show the highest, active layer
CONFIG_ZMK_WIDGET_LAYER_STATUS=y

# Enable a widget to show battery charge information
# CONFIG_ZMK_WIDGET_BATTERY_STATUS=y

# Enable a widget to show battery charge percentage information
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

# Enable a widget to show words per minute
# CONFIG_ZMK_WIDGET_WPM_STATUS=y

# This i snow needed to tell ZMK that a split key board connected through bluetooht is being used
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# This is to enable shut-off capability
CONFIG_ZMK_PM_SOFT_OFF=y
